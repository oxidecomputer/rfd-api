name: Release CLI

on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"
  pull_request:
    types: [labeled, synchronize]

jobs:
  release:
    if: >-
      github.event_name == 'push' ||
      github.event.label.name == 'release-test' ||
      contains(github.event.pull_request.labels.*.name, 'release-test')
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: rfd-cli
          - os: macos-15
            target: aarch64-apple-darwin
            binary: rfd-cli
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: rfd-cli
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            binary: rfd-cli.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=v0.0.0-pre+${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - run: |
          rustup toolchain install

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # 2.9.1

      - name: Build Release Binary
        run: |
          cargo build --release --package rfd-cli

      - name: Rename Binary
        shell: bash
        run: |
          mv "target/release/${{ matrix.binary }}" "target/release/rfd-cli-${{ matrix.target }}"

      - uses: ncipollo/release-action@caacf56b56ba217c4eaf0a9deb59dbcdd12abfcd
        with:
          allowUpdates: true
          draft: ${{ github.event_name == 'pull_request' }}
          tag: ${{ steps.tag.outputs.value }}
          artifacts: "target/release/rfd-cli-${{ matrix.target }}"
